<!DOCTYPE html>
<html>
<head>
	<title>Get Json Data</title>

<body>
<h1>HEADING</h1>

<div id="myDiv">

<h1>root element</h1>
</div>

<iframe width="420" height="345" src="https://www.youtube.com/embed/C2PsSWmWmvc">

</iframe>

<script>
const myJSON='[{"category":"COOKING","id":"COOK001","url":"https://www.youtube.com/embed/tgbNymZ7vqY","title":"Gongura Chutney"},{"category":"COOKING","id":"COOK002","url":"https://www.youtube.com/watch?v=C2PsSWmWmvc","title":"Gongura Chutney"},{"category":"CARS","id":"CARS001","url":"https://www.youtube.com/watch?v=rUlDdaFCqN8","title":"Maruti Suzuki Swift Car full service"},{"category":"SONGS","id":"SONG001","url":"https://www.youtube.com/watch?v=KAzP9GLGo3U","title":"Saptapadi(The Eternal Vow)"}]';
const myObj=JSON.parse(myJSON);
console.log(myObj);

const rootDiv = document.getElementById("myDiv");

function getSelected(){
	let result=[];
	myObj.map(eachItem=>{
		if(eachItem.category ==="COOKING"){
			result.push(eachItem);
		}		
		return result		
	})
	console.log("Result: ", result);
}
getSelected()

function displayData(){
	
	myObj.map(item => {
		const idElment = document.createElement("p");
		const videoElement = document.createElement("IFRAME");
		const titleElement = document.createElement("h2");
		
		idElment.textContent=item.id;
		console.log(item.id);
		rootDiv.appendChild(idElment);
		
		console.log(item.url);
		videoElement.setAttribute("src",item.url);		
		
		/*rootDiv.appendChild(videoElement);*/
	})
	
}
displayData()

</script>
